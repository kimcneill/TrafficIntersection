[General]
network = TrafficIntersection
sim-time-limit = 3600s

*.northSource.interarrivalTime = exponential(4s)
*.southSource.interarrivalTime = exponential(4s)
*.eastSource.interarrivalTime = exponential(4s)
*.westSource.interarrivalTime = exponential(4s)

[Config Baseline90]
description = "Baseline 90 second cycle"
*.controller.greenTime = 40s
*.controller.yellowTime = 5s
*.controller.redTime = 45s

[Config Short60]
description = "Short 60 second cycle"
*.controller.greenTime = 25s
*.controller.yellowTime = 5s
*.controller.redTime = 30s

[Config Long120]
description = "Long 120 second cycle"
*.controller.greenTime = 55s
*.controller.yellowTime = 5s
*.controller.redTime = 60s